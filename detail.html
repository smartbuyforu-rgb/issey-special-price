<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>상품 상세 · ISSEY MIYAKE SPECIAL PRICE</title>
<style>
*{box-sizing:border-box}html,body{margin:0;background:#f4f4f2;color:#202020;font-family:Arial,"Noto Sans KR",sans-serif}a{color:inherit}.top{position:sticky;top:0;z-index:30;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(255,255,255,.96);border-bottom:1px solid #ddd;backdrop-filter:blur(9px)}.back{text-decoration:none;font-size:14px;font-weight:700}.updated{font-size:10px;color:#777;text-align:right}.loading,.error{max-width:680px;margin:70px auto;padding:24px;text-align:center}.error{color:#a31b1b}.page{display:none;max-width:1050px;margin:0 auto;padding:14px 12px 40px}.gallery{background:#fff;border:1px solid #ddd;border-radius:14px;overflow:hidden}.main-image-wrap{position:relative;aspect-ratio:4/5;background:#efefed;display:flex;align-items:center;justify-content:center}.main-image{width:100%;height:100%;object-fit:contain}.image-count{position:absolute;right:10px;bottom:10px;background:rgba(0,0,0,.68);color:#fff;border-radius:999px;padding:5px 8px;font-size:11px}.thumbs{display:flex;gap:7px;overflow-x:auto;padding:8px;background:#fff}.thumb{flex:0 0 64px;width:64px;height:80px;padding:0;border:1px solid #ddd;border-radius:7px;overflow:hidden;background:#eee;cursor:pointer}.thumb.active{border:2px solid #111}.thumb img{width:100%;height:100%;object-fit:cover}.info{margin-top:12px;background:#fff;border:1px solid #ddd;border-radius:14px;padding:16px}.vendor{font-size:12px;color:#666;font-weight:700;letter-spacing:.03em}.title{font-size:22px;line-height:1.3;margin:7px 0 12px}.price-line{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}.price{font-size:22px;font-weight:800}.compare{font-size:13px;color:#999;text-decoration:line-through}.status{display:inline-block;margin-top:10px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}.status.in{background:#dcf5dc;color:#176e29}.status.out{background:#eee;color:#777}.meta{margin-top:13px;font-size:11px;color:#777;line-height:1.6}.section{margin-top:12px;background:#fff;border:1px solid #ddd;border-radius:14px;padding:15px}.section h2{font-size:15px;margin:0 0 12px}.variant{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;padding:10px 0;border-top:1px solid #eee}.variant:first-of-type{border-top:0}.variant-name{font-size:13px;font-weight:700;line-height:1.35}.sku{font-size:10px;color:#888;margin-top:3px}.variant-right{text-align:right}.variant-price{font-size:11px;color:#555;margin-bottom:4px}.badge{display:inline-block;border-radius:999px;padding:4px 7px;font-size:10px;font-weight:700}.badge.in{background:#dcf5dc;color:#176e29}.badge.out{background:#eee;color:#777}.description{font-size:13px;line-height:1.75;overflow-wrap:anywhere}.description img{max-width:100%;height:auto}.description table{max-width:100%;border-collapse:collapse}.description td,.description th{border:1px solid #ddd;padding:6px}.description a{word-break:break-all}.size-chart-wrap{width:100%;overflow-x:auto;border:1px solid #e3e3e3;border-radius:10px}.size-chart{width:100%;min-width:420px;border-collapse:collapse;background:#fff;font-size:12px}.size-chart th,.size-chart td{padding:10px 9px;border-right:1px solid #e7e7e7;border-bottom:1px solid #e7e7e7;text-align:center;white-space:nowrap}.size-chart th{background:#f5f5f3;font-weight:700}.size-chart tr:last-child td{border-bottom:0}.size-chart th:last-child,.size-chart td:last-child{border-right:0}.size-chart-note{margin-top:9px;font-size:11px;color:#666;line-height:1.6}.size-chart-lines{display:grid;gap:6px;font-size:12px;line-height:1.6}.size-chart-line{padding:7px 9px;border-bottom:1px solid #eee}.size-chart-line:last-child{border-bottom:0}.empty{font-size:12px;color:#888}.actions{display:grid;gap:8px;margin-top:14px}.action-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}.button{display:block;width:100%;text-align:center;text-decoration:none;padding:13px 12px;border:0;border-radius:10px;background:#222;color:#fff;font:700 14px Arial,"Noto Sans KR",sans-serif;cursor:pointer}.button.quote{background:#03c75a}.button.secondary{background:#fff;color:#222;border:1px solid #aaa}.notice{margin-top:10px;color:#777;font-size:10px;line-height:1.5}.not-found{display:none}.zoom{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:18px}.zoom.open{display:flex}.zoom img{max-width:100%;max-height:100%;object-fit:contain}.zoom-close{position:absolute;right:14px;top:14px;border:0;border-radius:999px;background:#fff;width:38px;height:38px;font-size:22px;cursor:pointer}@media(min-width:760px){.page{display:none;grid-template-columns:minmax(0,1fr) minmax(340px,.85fr);gap:15px;align-items:start;padding-top:20px}.page.ready{display:grid}.gallery{position:sticky;top:72px}.info{margin-top:0}.right .section:first-of-type{margin-top:12px}.main-image-wrap{aspect-ratio:4/5}}@media(max-width:759px){.page.ready{display:block}.title{font-size:19px}}
</style>
</head>
<body>
<header class="top"><a class="back" href="index.html">← 목록</a><div id="updated" class="updated"></div></header>
<div id="loading" class="loading">상세정보를 불러오는 중입니다…</div>
<div id="error" class="error" hidden></div>
<main id="page" class="page">
  <section class="gallery">
    <div class="main-image-wrap"><img id="mainImage" class="main-image" alt=""><span id="imageCount" class="image-count"></span></div>
    <div id="thumbs" class="thumbs"></div>
  </section>
  <div class="right">
    <section class="info">
      <div id="vendor" class="vendor"></div>
      <h1 id="title" class="title"></h1>
      <div class="price-line"><span id="price" class="price"></span><span id="compare" class="compare"></span></div>
      <span id="status" class="status"></span>
      <div id="meta" class="meta"></div>
      <div class="actions">
        <div class="action-pair">
          <button id="copyLink" class="button" type="button">상품 링크 복사</button>
          <a class="button quote" href="https://blog.naver.com/pilkyu01/224353040280" target="_blank" rel="noopener">견적 문의</a>
        </div>
        <a class="button secondary" href="index.html">상품 목록으로 돌아가기</a>
      </div>
      <div class="notice">이 화면은 로그인된 수집기가 저장한 마지막 확인 시점의 비공식 정보입니다. 실제 가격과 재고는 결제 시점에 달라질 수 있습니다.</div>
    </section>
    <section id="sizeChartSection" class="section" hidden><h2>サイズチャート</h2><div id="sizeChart"></div></section>
    <section class="section"><h2>옵션별 재고</h2><div id="variants"></div></section>
    <section class="section"><h2>상품 설명</h2><div id="description" class="description"></div></section>
  </div>
</main>
<div id="zoom" class="zoom"><button id="zoomClose" class="zoom-close" type="button" aria-label="닫기">×</button><img id="zoomImage" alt="확대 이미지"></div>
<script src="data/catalog.js"></script>
<script>
const $=id=>document.getElementById(id);
const yen=value=>Number.isFinite(Number(value))?'¥'+Number(value).toLocaleString('ja-JP'):'-';
function sanitizeHTML(value){
  if(!value)return '';
  const doc=new DOMParser().parseFromString(String(value),'text/html');
  doc.querySelectorAll('script,style,iframe,object,embed,form,input,button,link,meta').forEach(el=>el.remove());
  doc.querySelectorAll('*').forEach(el=>{
    [...el.attributes].forEach(attr=>{
      const name=attr.name.toLowerCase(), val=attr.value.trim().toLowerCase();
      if(name.startsWith('on')||((name==='href'||name==='src')&&val.startsWith('javascript:')))el.removeAttribute(attr.name);
    });
  });
  return doc.body.innerHTML;
}
function productPrices(product){
  const variants=product.variants||[];
  const prices=variants.map(v=>v.price).filter(v=>Number.isFinite(Number(v))).map(Number);
  const compares=variants.map(v=>v.compare_at_price).filter(v=>Number.isFinite(Number(v))).map(Number);
  return [prices.length?Math.min(...prices):null,compares.length?Math.min(...compares):null];
}
function render(product,payload){
  document.title=(product.title||'상품 상세')+' · SPECIAL PRICE';
  $('updated').textContent='수집 '+(payload.generated_at||'-');
  $('vendor').textContent=product.vendor||'ISSEY MIYAKE';
  $('title').textContent=product.title||'상품명 없음';
  const [price,compare]=productPrices(product);
  $('price').textContent=yen(price);
  $('compare').textContent=compare!==null&&compare!==price?yen(compare):'';
  $('status').textContent=product.available?'재고 있음':'전체 품절';
  $('status').className='status '+(product.available?'in':'out');
  const meta=[];
  if(product.product_type)meta.push('분류: '+product.product_type);
  if(product.tags&&product.tags.length)meta.push('태그: '+product.tags.join(', '));
  if(product.updated_at)meta.push('상품 업데이트: '+product.updated_at);
  $('meta').textContent=meta.join('\n');

  const images=[...(product.images||[])];
  if(product.image&&!images.includes(product.image))images.unshift(product.image);
  let current=0;
  function selectImage(index){
    current=index;
    $('mainImage').src=images[index]||'';
    $('mainImage').alt=product.title||'';
    $('imageCount').textContent=images.length?(index+1)+' / '+images.length:'NO IMAGE';
    [...$('thumbs').children].forEach((el,i)=>el.classList.toggle('active',i===index));
  }
  $('thumbs').innerHTML='';
  images.forEach((src,index)=>{
    const button=document.createElement('button');button.type='button';button.className='thumb';
    const img=document.createElement('img');img.src=src;img.alt=(product.title||'')+' '+(index+1);img.loading='lazy';
    button.appendChild(img);button.addEventListener('click',()=>selectImage(index));$('thumbs').appendChild(button);
  });
  if(images.length)selectImage(0);else{$('mainImage').removeAttribute('src');$('imageCount').textContent='NO IMAGE'}
  $('mainImage').addEventListener('click',()=>{if(images[current]){$('zoomImage').src=images[current];$('zoom').classList.add('open')}});

  const chart=product.size_chart||null;
  $('sizeChart').innerHTML='';
  if(chart&&((chart.rows&&chart.rows.length)||(chart.text_lines&&chart.text_lines.length))){
    if(chart.rows&&chart.rows.length){
      const wrap=document.createElement('div');wrap.className='size-chart-wrap';
      const table=document.createElement('table');table.className='size-chart';
      const headers=chart.headers||[];
      if(headers.length){
        const thead=document.createElement('thead'),tr=document.createElement('tr');
        headers.forEach(value=>{const th=document.createElement('th');th.textContent=value||'-';tr.appendChild(th)});
        thead.appendChild(tr);table.appendChild(thead);
      }
      const tbody=document.createElement('tbody');
      chart.rows.forEach(row=>{const tr=document.createElement('tr');(row||[]).forEach(value=>{const td=document.createElement('td');td.textContent=value||'-';tr.appendChild(td)});tbody.appendChild(tr)});
      table.appendChild(tbody);wrap.appendChild(table);$('sizeChart').appendChild(wrap);
    }else{
      const lines=document.createElement('div');lines.className='size-chart-wrap size-chart-lines';
      (chart.text_lines||[]).forEach(value=>{const line=document.createElement('div');line.className='size-chart-line';line.textContent=value;lines.appendChild(line)});
      $('sizeChart').appendChild(lines);
    }
    if(chart.note){const note=document.createElement('div');note.className='size-chart-note';note.textContent=chart.note;$('sizeChart').appendChild(note)}
    $('sizeChartSection').hidden=false;
  }

  const variants=product.variants||[];$('variants').innerHTML='';
  if(!variants.length){$('variants').innerHTML='<div class="empty">옵션 정보가 없습니다.</div>'}
  variants.forEach(v=>{
    const row=document.createElement('div');row.className='variant';
    const left=document.createElement('div');
    const name=document.createElement('div');name.className='variant-name';name.textContent=v.title||'옵션';left.appendChild(name);
    if(v.sku){const sku=document.createElement('div');sku.className='sku';sku.textContent='SKU '+v.sku;left.appendChild(sku)}
    const right=document.createElement('div');right.className='variant-right';
    if(v.price!==null&&v.price!==undefined){const vp=document.createElement('div');vp.className='variant-price';vp.textContent=yen(v.price);right.appendChild(vp)}
    const badge=document.createElement('span');badge.className='badge '+(v.available?'in':'out');badge.textContent=v.available?'재고 있음':'품절';right.appendChild(badge);
    row.append(left,right);$('variants').appendChild(row);
  });
  const clean=sanitizeHTML(product.description_html||'');
  $('description').innerHTML=clean||'<div class="empty">수집된 상품 설명이 없습니다. 다음 자동 업데이트에서 상세정보를 다시 확인합니다.</div>';
  $('loading').hidden=true;$('page').classList.add('ready');
}

async function copyCurrentProductLink(){
  const button=$('copyLink');
  const link=location.href;
  try{
    if(navigator.clipboard&&window.isSecureContext){
      await navigator.clipboard.writeText(link);
    }else{
      const area=document.createElement('textarea');
      area.value=link;area.setAttribute('readonly','');
      area.style.position='fixed';area.style.opacity='0';
      document.body.appendChild(area);area.select();
      if(!document.execCommand('copy'))throw new Error('copy failed');
      area.remove();
    }
    const original=button.textContent;button.textContent='복사 완료';
    setTimeout(()=>button.textContent=original,1500);
  }catch(error){
    window.prompt('아래 상품 링크를 복사하세요.',link);
  }
}

async function main(){
  const params=new URLSearchParams(location.search),handle=params.get('handle'),id=params.get('id');
  if(!handle&&!id)throw new Error('상품 식별자가 없습니다. 목록에서 상품을 다시 선택하세요.');
  let payload=window.__ISSEY_CATALOG__||null;
  if(!payload&&location.protocol!=='file:'){
    const response=await fetch('data/catalog.json?ts='+Date.now(),{cache:'no-store'});
    if(response.ok)payload=await response.json();
  }
  if(!payload){
    throw new Error('상품 데이터 파일을 불러오지 못했습니다. 03_TEST_UPDATE.bat을 다시 실행하세요.');
  }
  const product=(payload.products||[]).find(p=>(handle&&p.handle===handle)||(id&&String(p.id)===id));
  if(!product)throw new Error('해당 상품을 찾지 못했습니다. 목록이 갱신되어 상품이 제외됐을 수 있습니다.');
  render(product,payload);
}
$('copyLink').addEventListener('click',copyCurrentProductLink);
$('zoomClose').addEventListener('click',()=>$('zoom').classList.remove('open'));
$('zoom').addEventListener('click',event=>{if(event.target===$('zoom'))$('zoom').classList.remove('open')});
main().catch(error=>{$('loading').hidden=true;$('error').hidden=false;$('error').textContent=error.message||String(error)});
</script>
</body>
</html>
